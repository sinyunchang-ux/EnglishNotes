name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace 2>&1 | tee build_output.txt; exit ${PIPESTATUS[0]}

      - name: Show error if failed
        if: failure()
        run: |
          echo "=== GRADLE ERRORS ==="
          grep -E "(error:|Error:|FAILED|Exception|Unresolved)" build_output.txt | tail -60 || cat build_output.txt | tail -80

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: EnglishNotes-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_output.txt
          retention-days: 7
