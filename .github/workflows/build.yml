name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: |
          set +e
          ./gradlew assembleDebug --stacktrace 2>&1 | tee build_output.txt
          EXIT=${PIPESTATUS[0]}
          exit $EXIT

      - name: Save error log to repo
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "# Build Error Log"
            echo "## Errors"
            echo '```'
            grep -E "(error:|Error:|FAILED|Exception|Unresolved|cannot find|Could not)" build_output.txt | grep -v "^Note:" | tail -80 || true
            echo '```'
            echo "## Last 100 lines"
            echo '```'
            tail -100 build_output.txt
            echo '```'
          } > build_error.md

          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add build_error.md
          git commit -m "ci: add build error log"
          git push https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git HEAD:main

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: EnglishNotes-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
