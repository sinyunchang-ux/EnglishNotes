name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        id: build
        run: |
          set +e
          ./gradlew assembleDebug --stacktrace 2>&1 | tee build_output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          exit $EXIT_CODE

      - name: Commit error log back to repo
        if: failure()
        run: |
          # Extract key error lines
          echo "# Build Error Log" > build_error.md
          echo "## Error lines" >> build_error.md
          echo '```' >> build_error.md
          grep -E "(error:|Error:|FAILED|Exception|Unresolved|cannot find|Could not)" build_output.txt | grep -v "^Note:" | tail -80 >> build_error.md || true
          echo '```' >> build_error.md
          echo "## Last 80 lines" >> build_error.md
          echo '```' >> build_error.md
          tail -80 build_output.txt >> build_error.md
          echo '```' >> build_error.md

          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add build_error.md
          git commit -m "Add build error log for diagnosis"
          git push

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: EnglishNotes-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
